<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Contact Section</title>

        <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <link rel="stylesheet" href="css/contact.css">
    </head>

    <body>

        <section class="contact">

            <div class="contact-wrapper">

                <!-- Center Info -->
                <div class="contact-info">

                    <h2>Let's Work Together!</h2>

                    <div class="line"></div>

                    <p>
                        Have a project in mind or want to collaborate?
                        Feel free to reach out.
                    </p>

                    <div class="info-item">
                        <div class="icon">
                            <i class="fa-solid fa-gamepad"></i>
                        </div>

                        <div>
                            <h4>Game Developer</h4>
                            <span>Unity & Technical Artist</span>
                        </div>
                    </div>
                    
                    <div class="info-item">
                        <div class="icon">
                            <i class="fa-solid fa-envelope"></i>
                        </div>

                        <div>
                            <h4>Email</h4>
                            <a href="mailto:contact@useffarahmand.com">
                                contact@useffarahmand.com
                            </a>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="icon">
                            <i class="fa-brands fa-linkedin-in"></i>
                        </div>

                        <div>
                            <h4>LinkedIn</h4>
                            <a href="https://linkedin.com/in/usef-farahmand" target="_blank">
                                linkedin.com/in/usef-farahmand
                            </a>
                        </div>
                    </div>

                    <div class="info-item">
                        <div class="icon">
                            <i class="fa-brands fa-github"></i>
                        </div>

                        <div>
                            <h4>GitHub</h4>
                            <a href="https://github.com/usef-farahmand"
                            target="_blank">
                                github.com/usef-farahmand
                            </a>
                        </div>
                    </div>

                </div>

                <!-- Form -->
                <div class="contact-form">

                    <h3>Send a Message</h3>

                    <input type="text"
                            id="firstName"
                            placeholder="First Name*"
                            required>

                        <input type="text"
                            id="lastName"
                            placeholder="Last Name*"
                            required>

                        <input type="email"
                            id="emailAddress"
                            placeholder="Email Address*"
                            required>

                        <select id="jobRole">
                            <option value="" disabled selected hidden>
                                Job Role
                            </option>
                            <option value="Developer">Developer</option>
                            <option value="Designer">Designer</option>
                            <option value="Manager">Manager</option>
                            <option value="Other">Other</option>
                        </select>

                        <input type="url"
                            id="socialLink"
                            placeholder="GitHub or LinkedIn Address">

                        <textarea id="message"
                                rows="5"
                                maxlength="500"
                                placeholder="Message"></textarea>

                        <div class="char-counter">
                            <span id="charCount">0</span>/500 characters
                        </div>

                        <button id="btn" type="submit">
                            <i class="fa-solid fa-paper-plane"></i>
                            Send Message
                        </button>

                </div>

            </div>

        </section>

    </body>
</html>
